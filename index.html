<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="/src/styles.css" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>High-Performance Simulation</title>
    <script type="module" src="/src/main.tsx" defer></script>
    <style>
      body {
        font-family: system-ui, -apple-system, sans-serif;
        padding: 20px;
        background-color: #1e1e1e;
        color: #fff;
      }
      .panel {
        background-color: #2a2a2a;
        border: 1px solid #444;
        border-radius: 8px;
        padding: 20px;
        margin-bottom: 20px;
      }
      .stats {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
        gap: 15px;
        margin-top: 10px;
      }
      .stat-box {
        background-color: #333;
        padding: 15px;
        border-radius: 6px;
        text-align: center;
      }
      .stat-value {
        font-size: 24px;
        font-weight: bold;
        color: #4CAF50;
        margin-top: 5px;
      }
      .controls {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
      }
      button {
        background-color: #4CAF50;
        color: white;
        border: none;
        padding: 10px 20px;
        text-align: center;
        text-decoration: none;
        display: inline-block;
        font-size: 14px;
        border-radius: 4px;
        cursor: pointer;
        transition: background-color 0.3s;
      }
      button:hover {
        background-color: #45a049;
      }
      button.secondary {
        background-color: #2196F3;
      }
      button.secondary:hover {
        background-color: #0b7dda;
      }
      button.danger {
        background-color: #f44336;
      }
      button.danger:hover {
        background-color: #da190b;
      }
      .canvas-container {
        display: flex;
        justify-content: center;
        margin-top: 20px;
        width: 100%;
      }
      #simCanvas {
        background-color: #222;
        max-width: 100%;
        height: auto;
        border: 1px solid #444;
        border-radius: 4px;
      }
    </style>
  </head>
  <body>
    <div id="react-root"></div>
    <div class="panel" id="inspector-panel" style="display: none;">
      <h2>Entity Inspector</h2>
      <div class="stats">
        <div class="stat-box">
          <div>Entity ID</div>
          <div class="stat-value" id="inspect-id">-</div>
        </div>
        <div class="stat-box">
          <div>Health</div>
          <div class="stat-value" id="inspect-health">-</div>
        </div>
        <div class="stat-box">
          <div>Wealth</div>
          <div class="stat-value" id="inspect-money">-</div>
        </div>
        <div class="stat-box">
          <div>State</div>
          <div class="stat-value" id="inspect-state">-</div>
        </div>
      </div>
      <div style="margin-top: 15px;">
        <strong>Group Affiliations:</strong> <span id="inspect-groups">-</span>
      </div>
      <div style="margin-top: 10px;">
        <button id="btn-follow-entity" class="secondary">Follow Entity</button>
        <button id="btn-clear-inspector" class="danger">Clear Selection</button>
      </div>
    </div>

    <div class="panel">
      <h2>Simulation Performance</h2>
      <div class="stats">
        <div class="stat-box">
          <div>Total Entities</div>
          <div class="stat-value" id="stat-entities">100,000</div>
        </div>
        <div class="stat-box">
          <div>Last Tick Time</div>
          <div class="stat-value" id="stat-last-tick">0 ms</div>
        </div>
        <div class="stat-box">
          <div>Avg Tick Time</div>
          <div class="stat-value" id="stat-avg-tick">0 ms</div>
        </div>
        <div class="stat-box">
          <div>Min Tick (Window)</div>
          <div class="stat-value" id="minTickDisplay">0 ms</div>
        </div>
        <div class="stat-box">
          <div>Max Tick (Window)</div>
          <div class="stat-value" id="maxTickDisplay">0 ms</div>
        </div>
      </div>
    </div>

    <div class="panel">
      <h2>Simulation Controls</h2>
      <div class="controls">
        <button id="btn-toggle-loop">Start Loop</button>
        <button id="btn-single-step" class="secondary">Single Step Tick</button>
        <button id="btn-nation-command" class="danger">Issue Nation Command</button>
        <button id="btn-army-command" class="danger">Issue Army Command</button>
      </div>
    </div>

    <div class="panel">
      <h2>Persistence</h2>
      <div class="controls">
        <button id="saveBtn">Save World</button>
        <button id="loadBtn">Load World</button>
      </div>
    </div>

    <div class="canvas-container">
      <canvas id="simCanvas" width="1600" height="1200"></canvas>
    </div>
  </body>
</html>
