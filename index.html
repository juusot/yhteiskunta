<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="/src/styles.css" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Yhteiskunta - 100k Simulation</title>
    <script type="module" src="/src/main.tsx" defer></script>
    <style>
      :root {
        --color-bg: #ffffea; /* Pale Yellow */
        --color-panel: #ffffff;
        --color-text: #000000;
        --color-primary: #ffeb3b; /* Yellow */
        --color-accent1: #f44336; /* Red */
        --color-accent2: #2196f3; /* Blue */
        --color-accent3: #e91e63; /* Pink */
        --border-width: 3px;
      }

      body {
        font-family: 'Courier New', Courier, monospace;
        background-color: var(--color-bg);
        color: var(--color-text);
        margin: 0;
        padding: 10px;
        height: 100vh;
        display: grid;
        grid-template-columns: 1fr 350px;
        grid-template-rows: auto 1fr;
        gap: 10px;
        overflow: hidden;
      }

      .top-bar {
        grid-column: 1 / 2;
        display: flex;
        gap: 10px;
        padding: 10px;
        background: var(--color-panel);
        border: var(--border-width) solid #000;
      }

      .main-area {
        grid-column: 1 / 2;
        grid-row: 2 / 3;
        background: #000;
        border: var(--border-width) solid #000;
        position: relative;
        overflow: hidden;
      }

      .side-panel {
        grid-column: 2 / 3;
        grid-row: 1 / 3;
        background: var(--color-panel);
        border: var(--border-width) solid #000;
        overflow: hidden; /* Scroll handled in React */
      }

      canvas {
        width: 100%;
        height: 100%;
        object-fit: contain;
        image-rendering: pixelated;
      }

      button {
        background: var(--color-primary);
        color: #000;
        border: 2px solid #000;
        padding: 8px 12px;
        font-weight: bold;
        cursor: pointer;
        text-transform: uppercase;
        box-shadow: 4px 4px 0px #000;
      }

      button:active {
        box-shadow: 0px 0px 0px #000;
        transform: translate(4px, 4px);
      }

      button.secondary { background: var(--color-accent2); color: #fff; }
      button.danger { background: var(--color-accent1); color: #fff; }

      .speed-btn {
        padding: 4px 8px;
        font-size: 10px;
        box-shadow: 2px 2px 0px #000;
        background: #eee;
      }
      .speed-btn.active {
        background: var(--color-primary);
        box-shadow: inset 2px 2px 0px #000;
        transform: translate(1px, 1px);
      }
    </style>
  </head>
  <body>
    <!-- Top Bar: Controls -->
    <header class="top-bar">
      <button id="btn-toggle-loop">Start Loop</button>
      <button id="btn-single-step" class="secondary">Step</button>
      <button id="btn-territory-toggle" class="secondary">PolMap</button>
      <div style="width: 2px; background: #000; margin: 0 5px;"></div>
      <button id="btn-speed-1" class="speed-btn active">1x</button>
      <button id="btn-speed-2" class="speed-btn">2x</button>
      <button id="btn-speed-4" class="speed-btn">4x</button>
      <button id="btn-speed-max" class="speed-btn">MAX</button>
      <div style="flex-grow: 1;"></div>
      <button id="saveBtn">Save</button>
      <button id="loadBtn">Load</button>
    </header>

    <!-- Main Area: Map -->
    <main class="main-area">
      <canvas id="simCanvas" width="1600" height="1200"></canvas>
    </main>

    <!-- Side Panel: React Mount Point -->
    <aside class="side-panel" id="root"></aside>
  </body>
</html>
