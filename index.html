<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="/src/styles.css" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Yhteiskunta - 100k Simulation</title>
    <script type="module" src="/src/main.tsx" defer></script>
    <style>
      :root {
        --color-bg: #ffffea;
        --color-panel: #ffffff;
        --color-text: #000000;
        --color-primary: #ffeb3b;
        --color-accent1: #f44336;
        --color-accent2: #2196f3;
        --color-accent3: #e91e63;
        --border-width: 3px;
      }

      body {
        font-family: 'Courier New', Courier, monospace;
        background-color: var(--color-bg);
        color: var(--color-text);
        margin: 0;
        padding: 10px;
        height: 100vh;
        display: flex;
        flex-direction: column;
        gap: 10px;
        overflow: hidden;
      }

      .top-bar {
        display: flex;
        gap: 10px;
        padding: 10px;
        background: var(--color-panel);
        border: var(--border-width) solid #000;
      }

      .main-area {
        flex: 1;
        background: #000;
        border: var(--border-width) solid #000;
        position: relative;
        overflow: hidden;
      }

      canvas {
        width: 100%;
        height: 100%;
        object-fit: contain;
        image-rendering: pixelated;
      }

      /* Toggle Button - Fixed position bottom right */
      #btn-ui-toggle {
        position: fixed;
        bottom: 20px;
        right: 20px;
        z-index: 100;
        background: var(--color-primary);
        width: 50px;
        height: 50px;
        border-radius: 50%;
        font-size: 20px;
        display: flex;
        align-items: center;
        justify-content: center;
        box-shadow: 4px 4px 0px #000;
      }
      #btn-ui-toggle:active {
        box-shadow: 0px 0px 0px #000;
        transform: translate(4px, 4px);
      }

      /* Popup Panel */
      #ui-popup {
        position: fixed;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        width: 90vw;
        height: 80vh;
        max-width: 1200px;
        max-height: 800px;
        background: var(--color-panel);
        border: var(--border-width) solid #000;
        box-shadow: 8px 8px 0px #000;
        z-index: 200;
        display: none;
        overflow: hidden;
      }
      #ui-popup.visible {
        display: flex;
        flex-direction: column;
      }

      /* Close button for popup */
      #ui-popup .close-btn {
        position: absolute;
        top: 10px;
        right: 10px;
        width: 30px;
        height: 30px;
        background: var(--color-accent1);
        color: white;
        border: 2px solid #000;
        font-size: 18px;
        font-weight: bold;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 10;
      }

      button {
        background: var(--color-primary);
        color: #000;
        border: 2px solid #000;
        padding: 8px 12px;
        font-weight: bold;
        cursor: pointer;
        text-transform: uppercase;
        box-shadow: 4px 4px 0px #000;
      }

      button:active {
        box-shadow: 0px 0px 0px #000;
        transform: translate(4px, 4px);
      }

      button.secondary { background: var(--color-accent2); color: #fff; }
      button.danger { background: var(--color-accent1); color: #fff; }

      .speed-btn {
        padding: 4px 8px;
        font-size: 10px;
        box-shadow: 2px 2px 0px #000;
        background: #eee;
      }
      .speed-btn.active {
        background: var(--color-primary);
        box-shadow: inset 2px 2px 0px #000;
        transform: translate(1px, 1px);
      }
    </style>
  </head>
  <body>
    <!-- Top Bar: Controls -->
    <header class="top-bar">
      <div id="gameTimeDisplay" style="padding: 8px 12px; font-size: 12px; font-weight: bold; background: #fff; border: 2px solid #000; box-shadow: 2px 2px 0px #000;">Day 1, Year 1</div>
      <div style="width: 2px; background: #000; margin: 0 5px;"></div>
      <button id="btn-territory-toggle" class="secondary">PolMap</button>
      <div style="flex-grow: 1;"></div>
      <!-- Speed controls -->
      <button id="btn-speed-1" class="speed-btn active">1x</button>
      <button id="btn-speed-2" class="speed-btn">2x</button>
      <button id="btn-speed-4" class="speed-btn">4x</button>
      <button id="btn-speed-8" class="speed-btn">8x</button>
      <button id="btn-speed-max" class="speed-btn">MAX</button>
      <div style="width: 2px; background: #000; margin: 0 5px;"></div>
      <!-- Play/Pause -->
      <button id="btn-toggle-loop" style="min-width: 40px;">▶</button>
      <button id="btn-ui-toggle">☰</button>
      <div style="width: 2px; background: #000; margin: 0 5px;"></div>
      <button id="saveBtn">Save</button>
      <button id="loadBtn">Load</button>
    </header>

    <!-- Main Area: Map -->
    <main class="main-area">
      <canvas id="simCanvas" width="1600" height="1200"></canvas>
    </main>

    <!-- UI Popup -->
    <div id="ui-popup">
      <button class="close-btn" id="btn-ui-close">×</button>
      <div id="root" style="height: 100%;"></div>
    </div>
  </body>
</html>
