<body class="font-body-md text-on-surface h-screen w-screen flex flex-col relative">
<!-- TopAppBar -->
<header class="bg-surface-container-lowest dark:bg-surface-container-lowest text-on-surface dark:text-on-surface flex justify-between items-center w-full px-margin-lg py-unit h-16 max-w-full border-b-4 border-on-surface shadow-[4px_4px_0px_0px_rgba(0,0,0,1)] z-50 absolute top-0 left-0 right-0">
<div class="flex items-center gap-4">

            </div>
<div class="bg-secondary-container text-on-secondary-container px-4 py-1 border-2 border-on-surface font-headline-md text-headline-md font-bold tracking-tighter">

</div>
<div class="flex items-center gap-2">
<div class="flex gap-1 mr-4">

</div>
<button class="bg-primary-container text-on-primary-container border-2 border-on-surface px-3 py-1 font-label-bold text-label-bold hover:bg-on-surface hover:text-surface transition-colors duration-100 flex items-center justify-center">

</button>

<div class="absolute inset-0 bg-black/10 pointer-events-none"></div>
<!-- Floating Module: Event Spawner & Sandbox Controls -->
<div class="absolute top-24 right-6 w-96 bg-surface retro-border retro-shadow flex flex-col z-40 max-h-[calc(100vh-8rem)]">

</button>
</div>

<label class="flex items-center gap-2 cursor-pointer group">
<input class="form-checkbox h-4 w-4 text-on-surface border-2 border-on-surface rounded-none focus:ring-0 focus:ring-offset-0 bg-surface checked:bg-on-surface" type="checkbox"/>

</label>
<label class="flex items-center gap-2 cursor-pointer group">
<input checked="" class="form-checkbox h-4 w-4 text-on-surface border-2 border-on-surface rounded-none focus:ring-0 focus:ring-offset-0 bg-surface checked:bg-on-surface" type="checkbox"/>
<span class="font-body-md text-body-md group-hover:font-bold">Filter by Language: <span class="bg-surface-container-highest px-1 border border-on-surface">High Common</span></span>
</label>
<label class="flex items-center gap-2 cursor-pointer group">
<input class="form-checkbox h-4 w-4 text-on-surface border-2 border-on-surface rounded-none focus:ring-0 focus:ring-offset-0 bg-surface checked:bg-on-surface" type="checkbox"/>
<span class="font-body-md text-body-md group-hover:font-bold">Proximity to Capital &lt; 50px</span>
</label>
</div>
</div>

<option value="recruit">Recruit</option>
<option value="riot">Riot</option>
<option value="plague">Spawn Plague</option>
<option value="revolt">Incite Revolt</option>
</select>
</div>

<div class="border-2 border-on-surface bg-surface-container-lowest">

</div>
</div>
</div>

<div class="absolute top-0 bottom-0 left-2/4 border-l border-on-surface opacity-50"></div>
<div class="absolute top-0 bottom-0 left-3/4 border-l border-on-surface opacity-50"></div>
</div>
